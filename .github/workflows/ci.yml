name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio12345
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      WAREHOUSE_PATH: s3://warehouse/
      CATALOG_URI: sqlite:///./catalog.db
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt ruff
      - name: Create MinIO bucket
        run: |
          pip install awscli
          aws --endpoint-url http://localhost:9000 \
              --region us-east-1 \
              s3 mb s3://warehouse
        env:
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: minio12345
      - name: Lint
        run: ruff check src dashboard
      - name: End-to-end smoke
        run: python -m re_pipeline.seed
      - name: Verify Iceberg tables
        run: |
          python - <<'PY'
          from re_pipeline.iceberg_utils import get_catalog
          from re_pipeline.config import NAMESPACE
          cat = get_catalog()
          tables = {t[-1]: cat.load_table('.'.join(t)).scan().to_arrow().num_rows
                    for t in cat.list_tables(NAMESPACE)}
          print(tables)
          assert tables.get("bronze_listings", 0) > 0
          assert tables.get("gold_city_stats", 0) > 0
          PY
